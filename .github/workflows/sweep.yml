# Daily "sweep" for the Private Schooling Status Tracker.
#
# WHAT IT DOES
#   Runs run_pipeline.py every weekday morning, then commits the refreshed
#   data/candidates.json, data/meta.json and data/roster.json back to the repo.
#
# OPTIONAL: reference your live master Google Sheet (read-only) for de-duping.
#   Add two repo secrets under Settings -> Secrets and variables -> Actions:
#       GOOGLE_SA_JSON   = the whole service-account key .json file contents
#       MASTER_SHEET_ID  = the long id from the sheet's URL
#   and share the sheet with the service account's email as *Viewer*.
#   Left unset, the sweep still runs and de-dupes against the workbook only.

name: Daily school-tracker sweep

on:
  schedule:
    # GitHub cron is UTC and does NOT follow daylight saving.
    # 12:00 UTC = 8:00 AM Eastern during EDT (summer). Use '0 13 * * 1-5' for EST.
    - cron: '0 12 * * 1-5'      # Mon-Fri
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl google-auth

      - name: Run the sweep
        env:
          GOOGLE_SA_JSON:  ${{ secrets.GOOGLE_SA_JSON }}
          MASTER_SHEET_ID: ${{ secrets.MASTER_SHEET_ID }}
        run: python3 run_pipeline.py

      - name: Commit refreshed data
        run: |
          git config user.name  "sweep-bot"
          git config user.email "sweep-bot@users.noreply.github.com"
          git add data/candidates.json data/meta.json data/roster.json
          git commit -m "Daily sweep $(date -u +%Y-%m-%d)" || echo "no changes to commit"
          git push
